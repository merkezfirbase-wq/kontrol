<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CGA Operational Command - Premium Mobile</title>
    
    <script>
        // PC'den girilirse ana sayfaya geri gönder
        if (!/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            window.location.href = "site.html";
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff; --neon-green: #2ecc71; --neon-red: #e74c3c;
            --neon-gold: #ffcc00; --bg-dark: #0b141d; --card-bg: #1e3a4a;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg-dark);
            color: #e0e0e0; min-height: 100vh; overflow-x: hidden;
        }

        .container { width: 100%; padding: 15px; }

        /* HEADER TASARIMI */
        header { 
            display: flex; flex-direction: column; padding: 10px 0; 
            margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); 
        }
        
        .logo-area { text-align: center; margin-bottom: 15px; }
        #siteNameDisplay {
            font-family: 'Orbitron'; font-size: 24px; font-weight: 900;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(0, 210, 255, 0.3));
        }

        .header-buttons { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .header-buttons a, .header-buttons button {
            text-decoration: none; padding: 8px 12px; border-radius: 8px; 
            font-size: 11px; font-weight: 800; cursor: pointer; background: none;
        }

        /* İSTATİSTİK GRID */
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .stat-wrapper { display: flex; flex-direction: column; gap: 8px; }
        /* Tarih kısmını mobilde en üste tam genişlik yayıyoruz */
        .date-container { grid-column: span 2; display: flex; flex-direction: column; align-items: center; margin-bottom: 5px; }

        .stat-card { 
            background: var(--card-bg); padding: 15px; border-radius: 12px; 
            text-align: center; border-bottom: 3px solid var(--neon-blue); height: 100%;
        }
        .stat-label { font-size: 10px; color: #bbb; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .stat-val { font-size: 20px; font-weight: 800; color: #fff; }

        .stat-card.clickable { cursor: pointer; border-bottom-color: var(--neon-red); }
        .stat-card.clickable:active { transform: scale(0.95); background: rgba(231, 76, 60, 0.1); }

        /* PANEL VE KARTLAR */
        .panel { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--glass-border); }
        .panel-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }

        .patrol-card { 
            background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; 
            position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .status-badge {
            margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; 
            font-weight: 800; color: #fff; font-size: 12px; text-align: center;
            display: inline-block; width: 100%;
        }

        .patrol-info-row { font-size: 14px; margin-bottom: 5px; color: #fff; }
        .patrol-info-row b { color: #aaa; margin-right: 5px; font-size: 12px; }
        .total-time-row { color: var(--neon-gold); font-weight: 700; font-size: 14px; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }

        .missing-box {
            background: rgba(0, 0, 0, 0.25); padding: 12px; border-radius: 8px;
            margin-top: 15px; font-size: 13px; border-left: 4px solid var(--neon-red);
        }

        .guard-row { background: var(--card-bg); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-call { background: var(--neon-gold); color: #000; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 800; font-size: 12px; }

        /* MODALLAR (Full Mobile) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: #1a2a35; width: 90%; max-height: 85vh; padding: 20px;
            border-radius: 15px; position: relative; border: 1px solid var(--neon-blue);
            overflow-y: auto;
        }
        .modal-close { position: absolute; top: 10px; right: 15px; font-size: 30px; color: #fff; cursor: pointer; }
        .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 20px; color: var(--neon-blue); text-align: center; }

        .btn-detail {
            margin-top: 15px; background: rgba(255,255,255,0.07); border: 1px solid var(--glass-border);
            color: #fff; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; width: 100%;
        }

        input[type="date"], input[type="password"] { 
            background: #2a4d61; border: 1px solid var(--neon-blue); color: #fff; 
            padding: 10px; border-radius: 8px; width: 100%; font-family: 'Montserrat';
        }

        .stat-spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.1); border-radius: 50%;
            border-top-color: var(--neon-blue); animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="detailModal" class="modal-overlay">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div class="modal-title">📍 NOKTA OKUMA SAATLERİ</div>
        <div id="modalBody"></div>
    </div>
</div>

<div id="missingSummaryModal" class="modal-overlay">
    <div class="modal-content" style="border-color: var(--neon-red);">
        <span class="modal-close" onclick="closeMissingModal()">&times;</span>
        <div class="modal-title" style="color: var(--neon-red);">⚠️ GÜNLÜK EKSİK ÖZETİ</div>
        <div id="missingModalBody"></div>
    </div>
</div>

<div id="profileModal" class="modal-overlay">
    <div class="modal-content">
        <span class="modal-close" onclick="closeProfileModal()">&times;</span>
        <div class="modal-title">👤 PROFİL AYARLARI</div>
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <input type="password" id="newPassword" placeholder="Yeni Şifre">
            <button id="btnUpdatePass" style="background:var(--neon-blue); color:#000; border:none; padding:15px; border-radius:8px; font-weight:800;">ŞİFREYİ GÜNCELLE</button>
            <div id="passwordStatus" style="text-align:center; font-weight:700;"></div>
        </div>
    </div>
</div>

<div class="container">
    <header>
        <div class="logo-area">
            <div style="font-size: 9px; letter-spacing: 2px; color: var(--neon-blue); font-weight: 800; opacity: 0.8;">CGA GÜVENLİK MOBİL</div>
            <div id="siteNameDisplay">YÜKLENİYOR...</div>
        </div>
        <div class="header-buttons">
            <a href="olaylar.html" style="border:1px solid var(--neon-gold); color:var(--neon-gold);">⚠️ OLAYLAR</a>
            <button onclick="openProfileModal()" style="border:1px solid var(--neon-blue); color:var(--neon-blue);">👤 PROFİL</button>
            <button id="logoutBtn" style="border:1px solid var(--neon-red); color:var(--neon-red);">ÇIKIŞ</button>
        </div>
    </header>

    <div class="analytics-grid">
        <div class="date-container">
            <div style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 5px;">
                <button onclick="window.adjustDate(-1)" style="background: none; border: none; color: var(--neon-blue); font-size: 24px;">❮</button>
                <span id="displayDateTop" style="font-size: 14px; font-weight: 800; color: var(--neon-blue);">--.--.----</span>
                <button onclick="window.adjustDate(1)" style="background: none; border: none; color: var(--neon-blue); font-size: 24px;">❯</button>
            </div>
        </div>

        <div class="stat-wrapper">
            <div class="stat-card">
                <span class="stat-label">Nöbetdeki Güvenlik</span>
                <span class="stat-val" id="stat-active">0</span>
            </div>
        </div>

        <div class="stat-wrapper">
            <div class="stat-card">
                <span class="stat-label">Bugünkü Devriyeler</span>
                <span class="stat-val" id="stat-total">0</span>
            </div>
        </div>

        <div class="stat-wrapper" style="grid-column: span 2;">
            <div class="stat-card clickable" onclick="openMissingSummary()">
                <span class="stat-label">Bugünkü Eksik Devriyeler (Detay İçin Tıkla)</span>
                <span class="stat-val" id="stat-missing" style="color:var(--neon-red);">0</span>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">🛡️ AKTİF GÜVENLİK</div>
        <div id="securityStatus">Yükleniyor...</div>
    </div>
<div class="panel" style="border-left: 4px solid var(--neon-gold); padding: 12px;">
        <div class="panel-title" style="margin-bottom: 8px; font-size: 14px;">🧐 SON DENETLEME</div>
        <div id="lastPatrolStatus">
            <div class="stat-spinner"></div> <span style="font-size: 12px; color: #aaa;">Yükleniyor...</span>
        </div>
    </div>
    <div class="panel">
        <div class="panel-title" style="flex-direction: column; align-items: flex-start;">
            <span>📅 DEVRİYE GEÇMİŞİ</span>
            <input type="date" id="filterDate" style="margin-top: 10px;">
        </div>
        <div id="devriyeHistory"></div>
    </div>
</div>

<script type="module">
// FIREBASE VE TÜM MANTIK (MASAÜSTÜ İLE %100 AYNI)
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const storedUser = sessionStorage.getItem("currentUser");
const siteID = localStorage.getItem("siteID");
const siteConfigStr = localStorage.getItem("siteConfig");

if (!storedUser || !siteID || !siteConfigStr) { window.location.href = "index.html"; }

const currentUser = JSON.parse(storedUser).username;
const siteConfig = JSON.parse(siteConfigStr);
let app = getApps().find(a => a.name === `siteApp-${siteID}`) || initializeApp(siteConfig, `siteApp-${siteID}`);
const db = getDatabase(app);

let currentMissingList = [];
let tumNoktalar = [];

function formatDateTurkish(dateStr) {
    const parts = dateStr.split('-');
    return `${parts[2]}.${parts[1]}.${parts[0]}`;
}

window.openModal = function(pointsJson) {
    const points = JSON.parse(decodeURIComponent(pointsJson));
    const modalBody = document.getElementById("modalBody");
    modalBody.innerHTML = points.map(p => `
        <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
            <span style="font-size: 14px;">📍 ${p.name}</span>
            <span style="color:var(--neon-blue); font-weight:700;">${p.time || '--:--'}</span>
        </div>
    `).join('') || '<div style="color:#aaa; text-align:center;">Veri yok.</div>';
    document.getElementById("detailModal").style.display = "flex";
}
window.closeModal = function() { document.getElementById("detailModal").style.display = "none"; }

window.openMissingSummary = function() {
    const body = document.getElementById("missingModalBody");
    if(currentMissingList.length === 0) {
        body.innerHTML = '<div style="text-align:center; padding:20px; color:#aaa;">Eksik devriye yok.</div>';
    } else {
        body.innerHTML = currentMissingList.map(d => `
            <div style="background:rgba(231, 76, 60, 0.1); border:1px solid rgba(231, 76, 60, 0.2); border-radius:10px; padding:15px; margin-bottom:10px;">
                <b style="color:#fff; display:block; margin-bottom:5px;">👮 ${d.name} (${d.start})</b>
                <div style="font-size:12px; color:#e0e0e0;"><b>Eksik:</b> <span style="color:var(--neon-red);">${d.missingPoints.join(', ')}</span></div>
            </div>
        `).join('');
    }
    document.getElementById("missingSummaryModal").style.display = "flex";
}
window.closeMissingModal = function() { document.getElementById("missingSummaryModal").style.display = "none"; }

window.openProfileModal = function() { document.getElementById("profileModal").style.display = "flex"; }
window.closeProfileModal = function() { document.getElementById("profileModal").style.display = "none"; }

window.adjustDate = function(offset) {
    const dateInput = document.getElementById("filterDate");
    const current = new Date(dateInput.value);
    current.setDate(current.getDate() + offset);
    const newDate = current.toISOString().split('T')[0];
    dateInput.value = newDate;
    loadHistory(newDate); 
};

get(ref(db, "settings/siteName")).then(s => { if(s.exists()) document.getElementById("siteNameDisplay").innerText = s.val().toUpperCase(); });
get(ref(db,'qrCodes')).then(snapshot => {
    if(snapshot.exists()) Object.values(snapshot.val()).forEach(v => { if(v.name) tumNoktalar.push(v.name); });
});

onValue(ref(db,'nobetRecords'), snapshot => {
    const list = document.getElementById("securityStatus");
    list.innerHTML = '';
    let activeCount = 0;
    const val = snapshot.val();
    if(val) {
        Object.values(val).forEach(record => {
            if(record.status === 'started'){
                activeCount++;
                get(ref(db,'users/'+record.startBy)).then(userSnap => {
                    const phone = userSnap.val()?.phone || '';
                    const item = document.createElement('div');
                    item.className = 'guard-row';
                    // Uzun isimlerde taşmayı önleyen yeni yapı
                    item.innerHTML = `
                        <div style="display:flex; align-items:center; gap:12px; flex:1; min-width:0;">
                            <div style="font-size: 26px; flex-shrink: 0;">👮</div>
                            <div style="flex:1; min-width:0;">
                                <div style="display:flex; flex-wrap:wrap; align-items:center; gap:6px;">
                                    <b style="font-size:14px; color:#fff; word-break: break-word; line-height:1.2;">${record.startBy}</b>
                                    <span style="font-size:9px; color:var(--neon-green); background:rgba(46, 204, 113, 0.1); padding:2px 6px; border-radius:4px; font-weight:800; white-space:nowrap;">NÖBETTE</span>
                                </div>
                                <div style="font-size:10px; color:#aaa; margin-top:3px; display:flex; align-items:center; gap:4px;">
                                    ${record.shift === 'Gece' ? '<span>🌙</span> Gece Vardiyası' : '<span>☀️</span> Gündüz Vardiyası'}
                                </div>
                            </div>
                        </div>
                        <a href="tel:${phone}" class="btn-call" style="flex-shrink: 0; margin-left:10px; padding:10px 15px; min-width:65px; text-align:center;">ARA</a>
                    `;
                    list.appendChild(item);
                });
            }
        });
    }
    document.getElementById("stat-active").innerText = activeCount;
});

async function loadHistory(selectedDate) {
    document.getElementById("displayDateTop").innerText = formatDateTurkish(selectedDate);
    const list = document.getElementById("devriyeHistory");
    document.getElementById("stat-total").innerHTML = '<div class="stat-spinner"></div>';
    document.getElementById("stat-missing").innerHTML = '<div class="stat-spinner"></div>';
    list.innerHTML = "Yükleniyor...";
    
    let total = 0, missing = 0;
    currentMissingList = [];

    try {
        const snap = await get(ref(db, `devriyeHistory/${selectedDate}`));
        list.innerHTML = '';
        if(snap.exists()){
            const data = snap.val();
            let allRecords = [];
            for(const userKey in data) for(const recordKey in data[userKey]) allRecords.push(data[userKey][recordKey]);
allRecords.sort((a, b) => {
    // Tarihleri birleştirerek gerçek zamana göre sıralar
    const timeA = new Date(`${selectedDate}T${a.start}`).getTime();
    const timeB = new Date(`${selectedDate}T${b.start}`).getTime();
    return timeB - timeA; // En yeni en üste
});

            for(const d of allRecords) {
                total++;
                const isEksik = d.status.toLowerCase().includes('eksik');
                let okunanlar = (d.points || []).map(p => typeof p === "string" ? p : p.name);
                let hedefNoktalar = [...tumNoktalar];
                if(d.block) {
                    const bSnap = await get(ref(db, d.block + 'qrcodes'));
                    if(bSnap.exists()) hedefNoktalar = Object.values(bSnap.val()).map(v => v.name);
                }
                let eksikListe = hedefNoktalar.filter(p => !okunanlar.includes(p));

                if(isEksik) {
                    missing++;
                    currentMissingList.push({ name: d.name, start: d.start, end: d.end, missingPoints: eksikListe });
                }

                const pointsJson = encodeURIComponent(JSON.stringify(d.points || []));
               const card = document.createElement('div');
card.className = 'patrol-card';
card.innerHTML = `
    <div class="patrol-info-row"><b>Güvenlik:</b> ${d.name}</div>
    <div class="patrol-info-row"><b>Saat:</b> ${d.start} - ${d.end}</div>
    
    <div class="total-time-row" style="margin-bottom: 12px; border-bottom: none;">
        ⏱️ Toplam Süre: ${hesaplaSüre(d.start, d.end)} dakika
    </div>

    <div class="status-badge" style="position: static; transform: none; width: 100%; background: ${isEksik ? 'var(--neon-red)' : 'var(--neon-green)'};">
        ${isEksik ? 'EKSİK DEVRİYE' : 'TAM DEVRİYE'}
    </div>

    ${isEksik ? `<div class="missing-box" style="margin-top: 10px;"><b style="color:#aaa;">Eksik:</b> <span style="color:#fff;">${eksikListe.join(', ')}</span></div>` : ''}

    <button class="btn-detail" onclick="openModal('${pointsJson}')">🔍 Devriye Detaylarını Gör</button>
`;
list.appendChild(card);
            }
        } else {
            list.innerHTML = "<div style='text-align:center; padding:40px; color:#666;'>Kayıt yok.</div>";
        }
        document.getElementById("stat-total").innerText = total;
        document.getElementById("stat-missing").innerText = missing;
    } catch(err) { console.error(err); }
}

function hesaplaSüre(start, end) {
    if(!start || !end) return '0';
    const [sh, sm] = start.split(':').map(Number);
    const [eh, em] = end.split(':').map(Number);
    let startMin = sh * 60 + sm;
    let endMin = eh * 60 + em;
    if(endMin < startMin) endMin += 1440;
    return endMin - startMin;
}

document.getElementById("btnUpdatePass").onclick = async () => {
    const newPass = document.getElementById("newPassword").value;
    const statusDiv = document.getElementById("passwordStatus");
    if (newPass.length < 4) { statusDiv.style.color = "var(--neon-red)"; statusDiv.innerText = "ŞİFRE KISA!"; return; }
    await update(ref(db, `users/${currentUser}`), { password: newPass });
    statusDiv.style.color = "var(--neon-green)"; statusDiv.innerText = "GÜNCELLENDİ!";
    setTimeout(closeProfileModal, 1500);
};

const today = new Date().toISOString().split('T')[0];
document.getElementById("filterDate").value = today;
loadHistory(today);
document.getElementById("filterDate").onchange = (e) => loadHistory(e.target.value);
document.getElementById("logoutBtn").onclick = () => { sessionStorage.clear(); window.location.href='index.html'; };

window.onclick = function(event) { if (event.target.className === "modal-overlay") { closeModal(); closeProfileModal(); closeMissingModal(); } }
// --- MOBİL DENETLEME SİSTEMİ ENTEGRASYONU ---
import { initializeApp as initApp2 } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase as getDb2, ref as ref2, get as get2 } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const denetlemeConfig = {
    apiKey: "AIzaSyDF6XwfMwASz1mHt16DrR9jjjpozP4MBlA",
    authDomain: "denetleme-78b55.firebaseapp.com",
    databaseURL: "https://denetleme-78b55-default-rtdb.firebaseio.com",
    projectId: "denetleme-78b55",
    storageBucket: "denetleme-78b55.firebasestorage.app",
    messagingSenderId: "762780340283",
    appId: "1:762780340283:web:da64465ec4657307f64c1e"
};

const denetlemeApp = initApp2(denetlemeConfig, "denetlemeApp");
const denetlemeDb = getDb2(denetlemeApp);

async function checkMobileLastPatrol() {
    const statusDiv = document.getElementById("lastPatrolStatus");
    if(!statusDiv) return;
    try {
        const settingsSnap = await get(ref(db, "settings/projeId"));
        if (!settingsSnap.exists()) {
            statusDiv.innerHTML = "<span style='font-size:12px; color:var(--neon-red);'>Proje ID Bulunamadı</span>";
            return;
        }
        const currentProjectId = settingsSnap.val();
        const projectSnap = await get2(ref2(denetlemeDb, `projects/${currentProjectId}`));
        
        if (!projectSnap.exists() || !projectSnap.val().lastPatrolBy) {
            statusDiv.innerHTML = "<span style='font-size:12px; color:#666;'>Denetleme kaydı yok.</span>";
            return;
        }

        const data = projectSnap.val();
        const name = data.lastPatrolBy.name || "-";
        const dateStr = data.lastPatrolEndText || "-";

        const [datePart, timePart] = dateStr.split(' ');
        const [day, month, year] = datePart.split('.').map(Number);
        const patrolDate = new Date(year, month - 1, day);
        const weekday = patrolDate.toLocaleDateString('tr-TR', { weekday: 'short' }); // Mobilde kısa gün adı (Pzt, Sal)

        statusDiv.innerHTML = `
            <div style="font-size: 14px; margin-bottom: 2px;"><b>Denetleyen:</b> <span style="color:var(--neon-gold);">${name}</span></div>
            <div style="font-size: 12px; color: #bbb;">
                📅 ${datePart} <span style="color:var(--neon-blue);">${weekday}</span> | 🕒 ${timePart}
            </div>
        `;
    } catch (err) {
        statusDiv.innerHTML = "<span style='font-size:12px; color:var(--neon-red);'>Veri Hatası</span>";
    }
}
checkMobileLastPatrol();
</script>
</body>
</html>
